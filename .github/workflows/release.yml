name: Release

# Build static (musl) binaries for the architectures install.sh knows about,
# sign each with the project's minisign key, and publish them to a GitHub
# Release. This produces exactly the assets install.sh downloads and verifies:
#
#   override-<arch>-linux            the static binary
#   override-<arch>-linux.minisig    its minisign signature (prehashed / ED)
#   override_release_minisign.pub    the public key (redundant convenience copy)
#   SHA256SUMS                       informational checksums
#
# Trigger by pushing a version tag (vX.Y.Z), or manually via workflow_dispatch
# (useful for a dry run: with sign=false it builds + uploads artifacts but
# publishes no release and needs no secrets).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MINISIGN_SECRET_KEY  full contents of the minisign secret-key file
#                        (the two lines: "untrusted comment: ..." + the key)
#   MINISIGN_PASSWORD    the key's password (empty string if the key has none)
#
# The signing key must match the public key embedded in install.sh
# (key id BF7A2618AF8CEAE9); a mismatch makes every install.sh verification fail.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      sign:
        description: "Sign and publish a GitHub Release (needs the minisign secrets)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.arch }} (static musl)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-musl
          - arch: aarch64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build (static, release)
        env:
          # This crate has no C dependencies, so LLD can cross-link the aarch64
          # target without an external cross toolchain. rustc resolves rust-lld
          # from its own sysroot. (x86_64 links natively; the override is inert.)
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage and name the artifact
        run: |
          set -euo pipefail
          src="target/${{ matrix.target }}/release/override"
          out="override-${{ matrix.arch }}-linux"
          # Confirm it really is a static ELF for the expected architecture.
          file "$src"
          cp "$src" "$out"
          sha256sum "$out" | tee "$out.sha256"

      - name: Smoke-test (x86_64 only; runner is x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          set -euo pipefail
          ./override-${{ matrix.arch }}-linux --version
          d="$(mktemp -d)"; echo hello > "$d/t"
          ./override-${{ matrix.arch }}-linux --dry-run "$d/t"

      - uses: actions/upload-artifact@v4
        with:
          name: override-${{ matrix.arch }}-linux
          path: |
            override-${{ matrix.arch }}-linux
            override-${{ matrix.arch }}-linux.sha256
          retention-days: 7
          if-no-files-found: error

  release:
    name: Sign and publish release
    needs: build
    runs-on: ubuntu-latest
    # Publish for real on a tag push, or on a manual run only when sign=true.
    if: startsWith(github.ref, 'refs/tags/v') || inputs.sign
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Install minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Collect binaries and checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          cp artifacts/override-*-linux dist/
          ( cd dist && sha256sum override-*-linux > SHA256SUMS )
          cat dist/SHA256SUMS

      - name: Sign binaries (minisign, prehashed)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set" >&2
            exit 1
          fi
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          trap 'shred -u minisign.key 2>/dev/null || rm -f minisign.key' EXIT

          tag="${GITHUB_REF_NAME}"
          cd dist
          for bin in override-*-linux; do
            arch="${bin#override-}"; arch="${arch%-linux}"
            # -H forces the prehashed (ED) variant install.sh's OpenSSL fallback
            # expects; the trusted comment is covered by minisign's global sig.
            printf '%s\n' "${MINISIGN_PASSWORD:-}" | minisign -S -H \
              -s ../minisign.key \
              -m "$bin" -x "$bin.minisig" \
              -c "override $tag release binary ($arch, static musl)" \
              -t "override $tag $arch linux static (musl)"
          done
          # Self-check every signature against the repo's published public key,
          # so a wrong/rotated key fails the release instead of shipping bad sigs.
          for sig in *.minisig; do
            minisign -V -p ../override_release_minisign.pub \
              -m "${sig%.minisig}" -x "$sig"
          done

      - name: Assemble release assets
        run: |
          set -euo pipefail
          cp override_release_minisign.pub dist/
          ls -l dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes="$(cat <<EOF
          Static (musl) release binaries for \`$tag\`.

          Install and verify automatically:
          \`\`\`sh
          ./install.sh --version $tag
          \`\`\`
          Each binary is signed with minisign (key id \`BF7A2618AF8CEAE9\`); the
          signature ( \`*.minisig\` ) is verified against the key embedded in
          install.sh. See docs/installer.md and docs/release-pipeline.md.
          EOF
          )"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "override $tag" \
            --notes "$notes" \
            dist/override-*-linux \
            dist/override-*-linux.minisig \
            dist/override_release_minisign.pub \
            dist/SHA256SUMS
